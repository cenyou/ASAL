seed: 123
max_epoch: 40000
burning_epoch: 20000
batch_size: 200
min_T: 30
T: 30
time_token: false
optimizer: AdamW
lr: 0.001
scheduler: CosineAnnealing
scheduler_args:
  T_0: 1000
  T_mult: 2
loss: NMLELoss
gamma: 1
alpha: 1
fix_seed: true
clip_grads: true
design_type: random
verbose: 500
device: cuda
checkpoint: 100
load_checkpoint: false
checkpoint_name: ckpt_al_2d.tar
output_dir: ./outputs
file_name: aline_al_2d.pth
wandb:
  group: ${task.name}
  project: amortized-acquisition-engine
  use_wandb: false
  run_name: ${task.name}-${task.dim_x}D-${now:%Y-%m-%d_%H-%M}
encoder:
  _target_: model.encoder.Encoder
  dim_embedding: 32
  dim_feedforward: 128
  n_head: 4
  dropout: 0.0
  num_layers: 2
embedder:
  _target_: model.embedder.Embedder
  dim_x: ${task.dim_x}
  dim_y: ${task.dim_y}
  dim_embedding: ${encoder.dim_embedding}
  dim_feedforward: ${encoder.dim_feedforward}
  n_target_theta: ${task.n_target_theta}
  embedding_type: ${task.embedding_type}
head:
  _target_: model.head.OutputHead
  dim_x: ${task.dim_x}
  dim_y: ${task.dim_y}
  dim_embedding: ${encoder.dim_embedding}
  dim_feedforward: ${encoder.dim_feedforward}
  num_components: 10
  single_head: false
  std_min: 0.0001
  value_head: false
  time_token: ${time_token}
task:
  _target_: tasks.gaussian_process.GPTask
  name: AL_mix
  dim_x: 2
  dim_y: 1
  embedding_type: mix
  mask_type:
  - split
  n_selected_targets: null
  predefined_masks: null
  predefined_mask_weights: null
  mask_index: null
  attend_to: null
  n_context_init: 1
  n_query_init: 200
  n_target_data: 100
  n_target_theta: 3
  design_scale: 1
  noise_scale: 0.01
  lengthscale_lower: 0.2
  lengthscale_upper: 2.0
eval:
  EIG: false
